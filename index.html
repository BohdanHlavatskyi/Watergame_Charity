<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watergame Charity</title>
    <meta
      name="description"
      content="A charity: water inspired web game about protecting water bodies with a safe blue boundary line."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-backdrop" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="presentation" focusable="false">
              <defs>
                <linearGradient id="dropGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="100%" stop-color="#5ad7ff" />
                </linearGradient>
              </defs>
              <path d="M32 6 C22 20, 14 30, 14 40 c0 10 8 18 18 18s18-8 18-18c0-10-8-20-18-34z" fill="url(#dropGradient)" />
              <circle cx="38" cy="28" r="4" fill="#ffffff" opacity="0.88" />
            </svg>
          </div>
          <div>
            <p class="brand__eyebrow">charity: water</p>
            <h1>Watergame Charity</h1>
          </div>
        </div>

        <div class="hud" aria-label="Score and progress">
          <div class="hud__chip">
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="hud__chip">
            <span>Waterdrops</span>
            <strong id="dropValue">0</strong>
          </div>
          <div class="hud__chip">
            <span>Level</span>
            <strong id="levelValue">1 / 3</strong>
          </div>
          <button id="resetBtn" class="button button--ghost" type="button">Reset Run</button>
        </div>
      </header>

      <section class="status-card" aria-live="polite">
        <p id="statusText">Trace the blue safety line and click the floating cans to collect extra points.</p>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-bar__fill" id="routeProgress"></div>
        </div>
      </section>

      <section class="game-stage" id="gameStage" aria-label="Water protection game">
        <div class="scene-stack" id="sceneStack"></div>
        <div id="bubbleLayer" class="bubble-layer" aria-hidden="true"></div>
      </section>
    </main>

    <div id="victoryOverlay" class="victory-overlay is-hidden" aria-hidden="true">
      <div class="victory-card">
        <p class="victory-card__eyebrow">Mission complete</p>
        <h2>Every water body is protected.</h2>
        <p id="victoryCopy">Your blue barriers held across all locations. Reset to protect the waters again.</p>
        <div class="victory-card__actions">
          <button id="playAgainBtn" class="button" type="button">Play again</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
